name: Build & Release

# Push a version tag (e.g. v1.1.0) → build executables for Windows / macOS /
# Linux and attach them to the GitHub Release for that tag. You can also run it
# manually (Actions → Build & Release → Run workflow) to just produce artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write        # needed to create/update the release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: VDAS-Insight
            asset: VDAS-Insight-linux-x64.tar.gz
          - os: windows-latest
            bin: VDAS-Insight.exe
            asset: VDAS-Insight-windows-x64.zip
          - os: macos-latest
            bin: VDAS-Insight
            asset: VDAS-Insight-macos-arm64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller packaging/vdas-insight.spec --noconfirm

      - name: Package artifact
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.asset }}" == *.zip ]]; then
            7z a "${{ matrix.asset }}" "${{ matrix.bin }}"
          else
            tar czf "${{ matrix.asset }}" "${{ matrix.bin }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
          generate_release_notes: true
